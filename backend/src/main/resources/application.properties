# Server
server.port=8080

# Jackson — use snake_case for all JSON responses (matches frontend field names)
spring.jackson.property-naming-strategy=SNAKE_CASE

# Database — Supabase PostgreSQL (Transaction pooler recommended: works from
# any machine/region without extra network config, and pools connections for
# speed). Set these three from Supabase Dashboard -> Connect -> Transaction
# pooler connection string.
spring.datasource.url=${SUPABASE_DB_URL}
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP pool (compatible with transaction-mode pooler)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

# Auth — backend issues and validates its own JWTs (HS256); no Supabase Auth involved
jwt.secret=${JWT_SECRET}

# Resend email API
resend.api-key=${RESEND_API_KEY}
resend.from-email=${RESEND_FROM_EMAIL:GoldTrade <onboarding@resend.dev>}

# App URLs
app.url=${APP_URL:http://localhost:3000}
app.admin-notification-email=${ADMIN_NOTIFICATION_EMAIL:admin@example.com}

# GoldAPI.io — live XAU/PKR spot price for the investor dashboard chart.
# Two keys are rotated between (and used as fallback for each other) to
# stretch the free-tier request quota.
goldapi.key1=${GOLDAPI_KEY_1:}
goldapi.key2=${GOLDAPI_KEY_2:}

# CORS
cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# Rate limiting: only trust the X-Forwarded-For header for the client IP when the app
# genuinely sits behind a trusted reverse proxy that sets it (e.g. Railway). Leave false
# for local/direct exposure so a spoofed header can't bypass the login rate limit.
security.trust-forwarded-for=${SECURITY_TRUST_FORWARDED_FOR:false}

# Logging
logging.level.com.goldtrade=INFO
logging.level.org.hibernate.SQL=WARN
